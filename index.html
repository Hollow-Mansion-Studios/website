<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Mansion Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "EB Garamond", serif;
      background: #1a1a1a;
      color: #ffffff;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(180deg, #222222 0%, #1a1a1a 100%);
    }

    .banner {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 3rem;
    }

    .hero p {
      margin: 0;
      font-size: 1.2rem;
      color: #ffffff;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    section {
      margin-bottom: 40px;
    }

    h2 {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <header class="hero">
    <img src="assets/banner.png" alt="Hollow Mansion Studios banner" class="banner">
    <p>Currently developing a roguelite</p>
  </header>

  <main class="content">
    <section>
      <h2>About</h2>
      <p>Welcome to Hollow Mansion Studios. This is the official website for our projects and updates.</p>
    </section>

    <section>
      <h2>Projects</h2>
      <p>We are currently working on a roguelite.</p>
    </section>

    <section>
      <h2>Links</h2>
      <p>
        YouTube |
        Discord |
        Steam
      </p>
    </section>
  </main>
</body>
</html>
